<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="NoteHere — a Flutter notes app powered by Cloud Firestore.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="NoteHere">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>NoteHere</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  <script type="module">
    // Firebase Hosting / generic web fallback. When the page is served
    // outside Firebase Hosting this script is harmless; when it IS served
    // from Firebase Hosting, the SDK provides the project configuration
    // automatically so the app can connect to Firestore.
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    try {
      const response = await fetch("/__/firebase/init.json");
      if (response.ok) {
        window._firebaseConfig = await response.json();
        window._firebaseInitialized = true;
      }
    } catch (_) {
      // Not running on Firebase Hosting — fall back to the Dart-side
      // firebase_options.dart configuration.
    }
    if (window._firebaseConfig === undefined) {
      // No-op so the import isn't tree-shaken when running locally.
      initializeApp;
    }
  </script>
</body>
</html>
