name: Feature request
description: Suggest a new feature for NoteHere.
title: "[Feat]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Tell us about the feature you'd like to see. Remember that NoteHere
        is intentionally a small, beginner-friendly CRUD app, so larger
        changes (auth, offline persistence, attachments…) may be better
        suited to a fork.

  - type: textarea
    id: problem
    attributes:
      label: What is the problem or gap?
      description: Describe the workflow or behaviour you'd like to improve.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Sketch the experience or API surface you have in mind.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about and why this one fits better.
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Mockups, references, screenshots or related issues.
    validations:
      required: false