name: Bug report
description: Report a problem running or building NoteHere.
title: "[Bug]: "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please replace this text with
        a clear description and fill out the rest of the template.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of what went wrong.
      placeholder: When I tap "New note" the app crashes…
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered list of the exact steps that lead to the bug.
      placeholder: |
        1. Run `flutter run -d chrome`
        2. Click "New note"
        3. Type "Hello" in the title field
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: input
    id: flutter-version
    attributes:
      label: Flutter version
      description: Output of `flutter --version`
      placeholder: "Flutter 3.44.4 • channel stable • Dart 3.12.2"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device / browser
      description: "e.g. Pixel 7, Chrome 126 on Windows 11"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant `flutter run` logs, console errors, or attach a screenshot.
    validations:
      required: false