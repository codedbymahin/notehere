name: CI

# Continuous Integration for NoteHere.
#
# Runs static analysis and the widget test suite on every push and
# pull request. No deployment, no release automation — only signal
# that the main branch is healthy.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Static analysis & tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show toolchain versions
        run: |
          flutter --version
          dart --version

      - name: Resolve dependencies
        run: flutter pub get

      - name: Run static analysis
        run: flutter analyze

      - name: Run widget tests
        run: flutter test
