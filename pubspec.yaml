name: note_here
description: "NoteHere — a polished Flutter notes app backed by Cloud Firestore."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^4.0.0
  cloud_firestore: ^6.0.0
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # To add static assets, uncomment and list them below:
  # assets:
  #   - assets/images/

  # To add custom fonts, uncomment and fill the fonts block below.
  # See https://flutter.dev/to/font-from-package for details.
